<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Center - 存储检查</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Storage Center 存储检查</h1>
        
        <div id="storage-info" class="space-y-4">
            <div class="loading flex justify-center items-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            </div>
        </div>
        
        <div class="mt-8 space-y-4">
            <button id="refresh-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-colors">
                刷新存储信息
            </button>
            <button id="cleanup-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-md transition-colors">
                清理Storage Center数据
            </button>
        </div>
    </div>

    <script>
        // 检查localStorage使用情况
        function getStorageUsage() {
            let totalSize = 0;
            let storageCenterSize = 0;
            const storageCenterKeys = [];
            
            try {
                // 估算localStorage总容量（通常为5MB）
                const total = 5 * 1024 * 1024;
                
                // 计算当前使用情况
                for (let key in localStorage) {
                    if (localStorage.hasOwnProperty(key)) {
                        const value = localStorage[key];
                        const itemSize = new Blob([value]).size;
                        totalSize += itemSize;
                        
                        if (key.startsWith('storageCenterFiles_') || key.startsWith('storageCenterFileData_')) {
                            storageCenterSize += itemSize;
                            storageCenterKeys.push({ key, size: itemSize });
                        }
                    }
                }
                
                return {
                    total,
                    used: totalSize,
                    storageCenterUsed: storageCenterSize,
                    storageCenterKeys
                };
            } catch (error) {
                console.error('Error calculating storage usage:', error);
                return {
                    total: 5 * 1024 * 1024,
                    used: 0,
                    storageCenterUsed: 0,
                    storageCenterKeys: []
                };
            }
        }

        // 清理Storage Center数据
        function cleanupStorageCenterData() {
            try {
                const keysToRemove = [];
                
                for (let key in localStorage) {
                    if (localStorage.hasOwnProperty(key) && (key.startsWith('storageCenterFiles_') || key.startsWith('storageCenterFileData_'))) {
                        keysToRemove.push(key);
                    }
                }
                
                keysToRemove.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                console.log(`Cleaned up ${keysToRemove.length} Storage Center keys`);
                return true;
            } catch (error) {
                console.error('Error cleaning up storage center data:', error);
                return false;
            }
        }

        // 格式化存储大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 渲染存储信息
        function renderStorageInfo() {
            const storageUsage = getStorageUsage();
            const usagePercentage = (storageUsage.used / storageUsage.total) * 100;
            const storageCenterPercentage = (storageUsage.storageCenterUsed / storageUsage.total) * 100;
            
            const storageInfoEl = document.getElementById('storage-info');
            storageInfoEl.innerHTML = `
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-gray-700">总存储使用</span>
                        <span class="text-sm font-medium text-gray-700">${formatSize(storageUsage.used)} / ${formatSize(storageUsage.total)}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div class="h-2.5 rounded-full ${usagePercentage > 80 ? 'bg-red-500' : usagePercentage > 50 ? 'bg-yellow-500' : 'bg-green-500'}" style="width: ${Math.min(usagePercentage, 100)}%"></div>
                    </div>
                    <div class="mt-2 text-xs text-gray-500">使用了 ${usagePercentage.toFixed(1)}% 的存储空间</div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-medium text-gray-700">Storage Center 使用</span>
                        <span class="text-sm font-medium text-gray-700">${formatSize(storageUsage.storageCenterUsed)}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div class="h-2.5 rounded-full bg-blue-500" style="width: ${Math.min(storageCenterPercentage, 100)}%"></div>
                    </div>
                </div>
                
                <div class="mt-6">
                    <h3 class="text-sm font-medium text-gray-700 mb-3">存储项目 (${storageUsage.storageCenterKeys.length})</h3>
                    <div class="space-y-2">
                        ${storageUsage.storageCenterKeys.length > 0 ? 
                            storageUsage.storageCenterKeys.map((item, index) => `
                                <div class="flex items-center justify-between text-sm">
                                    <span class="text-gray-600 truncate max-w-xs">${item.key}</span>
                                    <span class="text-gray-500">${formatSize(item.size)}</span>
                                </div>
                            `).join('') : 
                            '<div class="text-sm text-gray-500">没有Storage Center存储项目</div>'
                        }
                    </div>
                </div>
                
                ${storageUsage.storageCenterKeys.filter(item => item.size > 1024 * 1024).length > 0 ? `
                    <div class="mt-6">
                        <h3 class="text-sm font-medium text-gray-700 mb-3">大文件 ( > 1MB )</h3>
                        <div class="space-y-2">
                            ${storageUsage.storageCenterKeys.filter(item => item.size > 1024 * 1024).map((item, index) => `
                                <div class="flex items-center justify-between text-sm">
                                    <span class="text-gray-600 truncate max-w-xs">${item.key}</span>
                                    <span class="text-gray-500">${formatSize(item.size)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderStorageInfo();
            
            // 刷新按钮
            document.getElementById('refresh-btn').addEventListener('click', renderStorageInfo);
            
            // 清理按钮
            document.getElementById('cleanup-btn').addEventListener('click', function() {
                if (confirm('确定要清理所有Storage Center数据吗？这将删除所有上传的文件和文件夹。')) {
                    const success = cleanupStorageCenterData();
                    if (success) {
                        alert('存储数据已清理完成！');
                        renderStorageInfo();
                    } else {
                        alert('清理失败，请检查控制台错误信息。');
                    }
                }
            });
        });
    </script>
</body>
</html>
