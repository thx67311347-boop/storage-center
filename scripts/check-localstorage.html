<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查localStorage数据</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>检查localStorage数据</h1>
    
    <h2>存储的键</h2>
    <div id="keys"></div>
    
    <h2>存储的数据</h2>
    <div id="data"></div>
    
    <h2>测试结果</h2>
    <div id="result"></div>

    <script>
        // 显示所有存储的键
        const keysElement = document.getElementById('keys');
        const dataElement = document.getElementById('data');
        const resultElement = document.getElementById('result');
        
        try {
            // 显示所有键
            const keys = Object.keys(localStorage);
            keysElement.innerHTML = `<pre>${keys.join('\n')}</pre>`;
            
            // 显示每个键的数据
            let dataHTML = '';
            keys.forEach(key => {
                try {
                    const value = localStorage.getItem(key);
                    dataHTML += `<h3>${key}</h3>`;
                    dataHTML += `<pre>${value}</pre>`;
                    
                    // 尝试解析JSON
                    try {
                        const parsed = JSON.parse(value);
                        dataHTML += `<p class="success">✓ 可以成功解析为JSON</p>`;
                    } catch (parseError) {
                        dataHTML += `<p class="error">✗ 无法解析为JSON: ${parseError.message}</p>`;
                    }
                } catch (error) {
                    dataHTML += `<p class="error">✗ 读取键 ${key} 时出错: ${error.message}</p>`;
                }
            });
            dataElement.innerHTML = dataHTML;
            
            resultElement.innerHTML = `<p class="success">检查完成！</p>`;
        } catch (error) {
            resultElement.innerHTML = `<p class="error">检查过程中出错: ${error.message}</p>`;
        }
        
        // 测试清理localStorage
        function clearStorage() {
            if (confirm('确定要清除所有localStorage数据吗？')) {
                localStorage.clear();
                alert('localStorage已清除');
                location.reload();
            }
        }
    </script>
    
    <button onclick="clearStorage()">清除localStorage</button>
</body>
</html>
