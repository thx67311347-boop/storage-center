<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清理localStorage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <h1>清理localStorage</h1>
    <p>点击下方按钮清理所有Storage Center的localStorage数据</p>
    <button class="button" onclick="cleanupAll()">清理所有数据</button>
    <button class="button" onclick="checkData()">检查数据</button>
    <div id="result"></div>

    <script>
        function cleanupAll() {
            const keys = Object.keys(localStorage);
            const storageCenterKeys = keys.filter(key => key.startsWith('storageCenter'));
            
            storageCenterKeys.forEach(key => {
                localStorage.removeItem(key);
                console.log('删除了:', key);
            });
            
            document.getElementById('result').innerHTML = 
                `<p class="success">成功清理了 ${storageCenterKeys.length} 个Storage Center相关的localStorage项目！</p>
                 <p>现在可以刷新应用页面了。</p>`;
        }
        
        function checkData() {
            const keys = Object.keys(localStorage);
            const storageCenterKeys = keys.filter(key => key.startsWith('storageCenter'));
            
            let html = `<h3>找到 ${storageCenterKeys.length} 个Storage Center相关项目：</h3><ul>`;
            
            storageCenterKeys.forEach(key => {
                let value = localStorage.getItem(key);
                if (value && value.length > 100) {
                    value = value.substring(0, 100) + '...';
                }
                html += `<li><strong>${key}</strong>: ${value}</li>`;
            });
            
            html += '</ul>';
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
